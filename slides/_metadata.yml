# _metadata.yml — Quarto-Defaults für alle Slide-Decks unter slides/
#
# Wirkt rekursiv auf alle .qmd-Files in diesem Verzeichnis und Unter-Verzeichnissen.
# Slide-Files brauchen keine vollständige Reveal.js-Konfiguration mehr im
# Frontmatter — die kommt von hier. Title, Subtitle, ggf. Theme-Override
# regeln die Slide-Files selbst.

execute:
  freeze: auto
  echo: false
  eval: false

lang: de

d2:
  layout: dagre
  theme: "NeutralDefault"
  sketch: false

bibliography: references.bib
csl: https://www.zotero.org/styles/apa

title-slide-attributes:
  data-background-iframe: ""

filters:
  - d2

format:
  revealjs:
    pointer:
      color: green
      pointerSize: 25
    reference-location: document
    toc: false
    toc-depth: 1
    embed-resources: false
    # Theme-Stack: A (Pure Platform-Mirror) ist Default. custom-new.scss bleibt
    # vor A geladen, damit Pattern-Klassen (.feature, .timeline, .codewindow,
    # .glow-circle, ...) weiter definiert sind — A überschreibt Tokens, Cards,
    # Title-Slide und Motion. Wer den alten Premium-Blueprint-Look will, setzt
    # im Deck-Frontmatter `theme: [default, custom-new.scss]` (und re-aktiviert
    # template-partials, include-in-header, include-after-body, sowie das
    # background-iframe — siehe slides/AGENTS.md).
    theme:
      - default
      - custom-new.scss
      - redesign/tokens-platform.scss
      - redesign/motion-editorial.scss
      - redesign/variant-a-pure.scss
    incremental: true
    transition: none
    background-transition: fade
    transition-speed: slow
    code-copy: true
    code-line-numbers: true
    highlight-style: github
    revealjs-plugins:
      - codewindow
    smaller: false
    scrollable: true
    slide-number: false
    preview-links: auto
    mermaid:
      theme: default
      securityLevel: loose
    footer: "Jan Kirenz"
    template-partials: []
    include-in-header: []
    include-after-body: []
