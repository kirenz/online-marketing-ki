<section id="$idprefix$title-slide"$for(title-slide-attributes/pairs)$ $it.key$="$it.value$"$endfor$>
  <h1 class="title">$title$</h1>
  $if(subtitle)$
  <p class="subtitle">$subtitle$</p>
  $endif$
  $for(by-author)$
  <p class="quarto-title-author-name">$it.name.literal$</p>
  $endfor$
</section>
