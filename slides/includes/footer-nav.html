<style>
.reveal .slide-number {
    display: none !important;
}

.reveal-footer-nav {
    position: fixed;
    bottom: 10px;
    right: 20px;
    z-index: 1000;
    display: flex;
    gap: 10px;
}

.footer-nav-button {
    width: 45px;
    height: 45px;
    border-radius: 50%;
    background: linear-gradient(135deg, rgba(59, 130, 246, 0.9), rgba(16, 163, 127, 0.9));
    border: 2px solid rgba(255, 255, 255, 0.8);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
}

.footer-nav-button:hover {
    transform: scale(1.1);
    box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
}

.footer-nav-button:active {
    transform: scale(0.95);
}

.footer-nav-button svg {
    width: 20px;
    height: 20px;
}
</style>
