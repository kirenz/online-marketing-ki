project:
  type: book
  output-dir: _book
  # Mono-Repo: Slides liegen unter slides/ als eigenständige Reveal.js-Decks
  # mit eigenem Frontmatter und _metadata.yml. Slides werden NICHT vom
  # Buch-Build erfasst.
  render:
    - "*.qmd"
    - "beispiel-modul/*.qmd"
    # Pro neuem Modul eine Zeile ergänzen:
    # - "<modul-2-slug>/*.qmd"

lang: de

execute:
  freeze: auto

book:
  title: "Kurs-Titel"
  description: "Schablone — auf konkreten Kurs anpassen"
  author: "Jan Kirenz"

  search:
    type: overlay
  page-footer:
    left: |
      © [Jan Kirenz](https://www.kirenz.com/), 2026

  chapters:
    - index.qmd
    - introduction.qmd

    - part: beispiel-modul/index.qmd
      chapters:
        - beispiel-modul/beispiel-lesson.qmd

    # Pro neuem Modul einen Part-Block:
    # - part: <modul-2-slug>/index.qmd
    #   chapters:
    #     - <modul-2-slug>/<lesson-1>.qmd
    #     - <modul-2-slug>/<lesson-2>.qmd

format:
  html:
    toc: true
    # Theme-Stack: cosmo als Bootstrap-Basis, book-theme.scss zieht den
    # Plattform-Mirror-Look (Geist, Cream-Paper, Ink, Ochre, Terracotta) durch.
    # Schwester-Datei zu slides/redesign/variant-a-pure.scss — gleiche DNA für
    # Buch und Slides.
    theme:
      - cosmo
      - book-theme.scss
    code-copy: true
    # github (light) statt github-dark — passt zum Cream-Paper-Hintergrund.
    highlight-style: github
    code-overflow: wrap
    author-meta: "Jan Kirenz"
    callout-appearance: simple
